pricing_subtitle: >
  SimpleLogin est <a href="https://github.com/simple-login">open source</a>, peut être auto-hébergé et est financé à 100 % par la communauté. Nous n'utilisons pas vos données, nous ne suivons pas vos activités et nous ne vous diffusons aucune publicité. SimpleLogin dépend de votre soutien pour continuer à faire fonctionner le service et développer de nouvelles fonctionnalités.
